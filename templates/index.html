<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Diabetes Predictor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-xl">

    <h1 class="text-2xl font-bold text-center mb-6">
        Diabetes Prediction App
    </h1>

    <form method="POST" class="space-y-3">

        <input name="pregnancies" placeholder="Pregnancies" class="w-full p-2 border rounded" />
        <input name="glucose" placeholder="Glucose" class="w-full p-2 border rounded" />
        <input name="bp" placeholder="Blood Pressure" class="w-full p-2 border rounded" />
        <input name="skin" placeholder="Skin Thickness" class="w-full p-2 border rounded" />
        <input name="insulin" placeholder="Insulin" class="w-full p-2 border rounded" />
        <input name="bmi" placeholder="BMI" class="w-full p-2 border rounded" />
        <input name="dpf" placeholder="Diabetes Pedigree Function" class="w-full p-2 border rounded" />
        <input name="age" placeholder="Age" class="w-full p-2 border rounded" />

        <button type="submit"
            class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700">
            Predict
        </button>
    </form>

    {% if result %}
        <div class="mt-5 text-center text-xl font-semibold">
            Result: {{ result }}
        </div>
    {% endif %}

</div>

</body>
</html>
